<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Bottle List at CA</title>
<style>
:root{--bg:#120f0b;--panel:#1f1a14;--panel2:#2a2219;--ink:#f7efe2;--muted:#b8a991;--line:#493a28;--gold:#d7a84f;--gold2:#f0c76b;--danger:#d86b5f;--ok:#71bf8c;--shadow:0 14px 36px rgba(0,0,0,.28);--r:18px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#17120c,#0f0d0a);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.app{max-width:980px;margin:0 auto;padding:16px 14px 42px}.top{position:sticky;top:0;z-index:10;margin:-16px -14px 14px;padding:18px 14px 12px;background:rgba(18,15,11,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}h1{margin:0;font-size:1.55rem;letter-spacing:.02em}.sub{color:var(--muted);font-size:.88rem;margin-top:4px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}.btn{border:1px solid var(--line);border-radius:999px;background:var(--panel2);color:var(--ink);padding:10px 13px;font-weight:700;cursor:pointer;min-height:42px}.btn.primary{background:linear-gradient(180deg,var(--gold2),var(--gold));color:#21160a;border-color:#f3cc73}.btn.danger{background:#3a1d1a;color:#ffd7d2;border-color:#7b332c}.btn.ghost{background:transparent}.btn:active{transform:translateY(1px)}.search{width:100%;margin-top:10px;display:flex;gap:8px}.search input{flex:1}.filters{display:flex;gap:8px;overflow:auto;padding:4px 0 2px;margin-top:8px}.chip{white-space:nowrap;border:1px solid var(--line);background:#18130e;color:var(--muted);border-radius:999px;padding:8px 11px;cursor:pointer}.chip.active{background:#3a2a13;color:var(--gold2);border-color:#805d26}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#120f0b;color:var(--ink);padding:11px 12px;font-size:16px;outline:none}textarea{min-height:92px;resize:vertical}.grid{display:grid;grid-template-columns:1fr;gap:12px}.card{background:linear-gradient(180deg,var(--panel),#18140f);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}.bottle-card{display:grid;grid-template-columns:86px 1fr;gap:12px;padding:12px;cursor:pointer}.photo{width:86px;height:112px;background:#0d0b08;border:1px solid var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);overflow:hidden}.photo img{width:100%;height:100%;object-fit:cover}.bottle-title{font-size:1.05rem;font-weight:800;margin:1px 0 3px}.meta{color:var(--muted);font-size:.88rem;line-height:1.35}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.badge{border:1px solid var(--line);background:#17120d;border-radius:999px;padding:4px 8px;color:var(--muted);font-size:.78rem}.badge.ok{color:#bdf3ce;border-color:#31543a;background:#132018}.badge.gold{color:var(--gold2);border-color:#6c4f22;background:#241a0e}.empty{border:1px dashed var(--line);border-radius:var(--r);padding:28px;text-align:center;color:var(--muted);background:rgba(31,26,20,.55)}.screen{display:none}.screen.active{display:block}.form{padding:14px}.section-title{font-weight:900;color:var(--gold2);margin:14px 0 8px}.fields{display:grid;grid-template-columns:1fr;gap:10px}.field label{display:block;color:var(--muted);font-size:.82rem;margin:0 0 5px 2px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.unit{display:flex;align-items:center;gap:7px}.unit input{flex:1}.unit span{color:var(--muted);min-width:max-content}.switches{display:grid;grid-template-columns:1fr 1fr;gap:10px}.switch{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:14px;padding:10px;background:#15110d}.switch input{width:auto;transform:scale(1.2)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.detail{padding:14px}.detail-head{display:grid;grid-template-columns:116px 1fr;gap:14px}.detail .photo{width:116px;height:150px}.detail h2{margin:0 0 6px}.detail-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:14px}.kv{border:1px solid var(--line);border-radius:12px;padding:10px;background:#15110d}.kv b{display:block;color:var(--muted);font-size:.78rem;margin-bottom:3px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#1c2a1f;color:#dff7e5;border:1px solid #3f7650;border-radius:999px;padding:11px 16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.18s;z-index:99}.toast.show{opacity:1}.warn{background:#2c1d12;color:#ffd7a2;border-color:#8a5b25}.error{background:#311916;color:#ffd7d2;border-color:#8c3a32}.diag{margin-top:10px;border:1px solid #704038;background:#21110f;color:#ffd7d2;border-radius:12px;padding:10px;display:none;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.78rem}.diag.show{display:block}@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}.fields{grid-template-columns:1fr 1fr}.field.wide{grid-column:1/-1}.detail-grid{grid-template-columns:1fr 1fr}.detail-grid .wide{grid-column:1/-1}.bottle-card{grid-template-columns:100px 1fr}.photo{width:100px;height:130px}}
</style>
</head>
<body>
<div class="app" data-testid="app-root">
  <header class="top">
    <h1>🥃 My Bottle List at CA</h1>
    <div class="sub">Simple whisky bottle inventory · small JPEG photos · JSON import/export</div>
    <div class="toolbar">
      <button class="btn primary" data-action="new">+ Add Bottle</button>
      <button class="btn" data-action="export">Export JSON</button>
      <label class="btn" for="importFile">Import JSON</label><input id="importFile" type="file" accept="application/json,.json" hidden />
      <button class="btn danger" data-action="reset">Reset Storage</button>
    </div>
    <div class="search"><input id="searchInput" placeholder="Search bottle, brand, distillery, cask, notes…" /></div>
    <div class="filters" id="filters"></div>
  </header>

  <main>
    <section id="listScreen" class="screen active" data-testid="section-list"><div id="list" class="grid"></div></section>
    <section id="formScreen" class="screen" data-testid="section-form">
      <div class="card form">
        <h2 id="formTitle">Add Bottle</h2>
        <input id="bottleId" type="hidden" />
        <div class="section-title">Identity</div>
        <div class="fields">
          <div class="field wide"><label>Bottle Name</label><input id="name" required /></div>
          <div class="field"><label>Brand</label><input id="brand" list="brandList" /></div>
          <div class="field"><label>Distillery</label><input id="distillery" list="distilleryList" /></div>
          <div class="field"><label>Independent Bottler</label><input id="independentBottler" list="independentBottlerList" /></div>
          <div class="field"><label>Category</label><input id="category" list="categoryList" /></div>
          <div class="field"><label>Country</label><input id="country" list="countryList" /></div>
          <div class="field"><label>Region</label><input id="region" list="regionList" /></div>
          <div class="field"><label>Cask Type</label><input id="caskType" list="caskTypeList" /></div>
          <div class="field wide"><label>Photo JPEG/PNG, recommended under 100 KB</label><input id="photoInput" type="file" accept="image/jpeg,image/png,image/webp" /><div id="photoPreview" class="photo" style="margin-top:8px">No photo</div></div>
        </div>
        <div class="section-title">Whisky Details</div>
        <div class="fields">
          <div class="field"><label>Age Statement</label><div class="unit"><input id="age" inputmode="numeric" /><span>Years Old</span></div></div>
          <div class="field"><label>ABV</label><div class="unit"><input id="abv" inputmode="decimal" /><span>%</span></div></div>
          <div class="field"><label>Personal Rating</label><input id="rating" placeholder="e.g. 88/100" /></div>
          <div class="field"><label>Quantity Owned</label><input id="quantity" type="number" min="0" step="1" value="1" /></div>
        </div>
        <div class="switches" style="margin-top:10px">
          <label class="switch">Non-Chill Filtered <input id="nonChillFiltered" type="checkbox" /></label>
          <label class="switch">Natural Colour <input id="naturalColour" type="checkbox" /></label>
        </div>
        <div class="section-title">Collection</div>
        <div class="fields">
          <div class="field"><label>Status</label><select id="status"><option>Sealed</option><option>Opened</option><option>Finished</option><option>Archived</option><option>Reserved</option></select></div>
          <div class="field"><label>Fill Level</label><select id="fillLevel"><option>100%</option><option>90%</option><option>75%</option><option>50%</option><option>25%</option><option>&lt;10%</option><option>0%</option></select></div>
          <div class="field"><label>Date Acquired</label><input id="dateAcquired" type="date" /></div>
          <div class="field"><label>Date Opened</label><input id="dateOpened" type="date" /></div>
          <div class="field"><label>Date Finished</label><input id="dateFinished" type="date" /></div>
          <div class="field"><label>Purchase Price</label><input id="purchasePrice" inputmode="decimal" /></div>
        </div>
        <div class="switches" style="margin-top:10px">
          <label class="switch">Favourite ⭐ <input id="favourite" type="checkbox" /></label>
          <label class="switch">Repurchase ❤️ <input id="repurchase" type="checkbox" /></label>
          <label class="switch">Replacement Needed 🔔 <input id="replacementNeeded" type="checkbox" /></label>
        </div>
        <div class="field wide" style="margin-top:10px"><label>Tasting Notes</label><textarea id="notes"></textarea></div>
        <div class="actions">
          <button class="btn primary" data-action="save">Save Bottle</button>
          <button class="btn danger" id="deleteEditBtn" data-action="delete-current" style="display:none">Delete Bottle</button>
          <button class="btn" data-action="cancel">Cancel</button>
        </div>
        <div id="diag" class="diag"></div>
      </div>
    </section>
    <section id="detailScreen" class="screen" data-testid="section-detail"></section>
  </main>
</div>

<datalist id="brandList"></datalist><datalist id="distilleryList"></datalist><datalist id="independentBottlerList"></datalist><datalist id="categoryList"></datalist><datalist id="countryList"></datalist><datalist id="regionList"></datalist><datalist id="caskTypeList"></datalist>
<div id="toast" class="toast"></div>

<script type="module" data-script-type="dashboard-glue">
const APP_KEY='myBottleListAtCA.v1.clean';
const SCHEMA_VERSION=1;
const DEFAULT_LISTS={
  brands:['Ardbeg','Balvenie','Bruichladdich','GlenDronach','Glenfiddich','Glenmorangie','Highland Park','Laphroaig','Macallan','Springbank','Yamazaki'],
  distilleries:['Ailsa Bay','Ardbeg','Balvenie','Bruichladdich','Fettercairn','Glen Grant','Glendronach','Glenglassaugh','Glenmorangie','Highland Park','Lagg','Laphroaig','Lochranza','Macallan','Springbank','Tomatin','Yamazaki'],
  independentBottlers:['Adelphi','Berry Bros. & Rudd','Cadenhead\'s','Douglas Laing','Elixir Distillers','Gordon & MacPhail','Hunter Laing','Lady of the Glen','North Star Spirits','Signatory Vintage','Thompson Bros.'],
  categories:['Single Malt Scotch','Blended Malt Scotch','Blended Scotch','Single Grain Scotch','Bourbon','Rye','American Whiskey','Irish Whiskey','Japanese Whisky','Canadian Whisky','World Whisky','Rum','Cognac','Armagnac','Other Spirits'],
  countries:['Scotland','Ireland','Japan','United States','Canada','Taiwan','India','France','Australia','England','Wales','Sweden','Denmark','Netherlands','New Zealand','Other'],
  regions:['Highland','Speyside','Islay','Campbeltown','Lowland','Island','Japan','Ireland','Kentucky','Tennessee','Taiwan','World / Other'],
  caskTypes:['Bourbon Barrel','First Fill Bourbon','Refill Bourbon','Sherry Cask','Oloroso Sherry','PX Sherry','Port Cask','Rum Cask','Wine Cask','Red Wine Cask','Amarone Cask','Madeira Cask','Marsala Cask','Sauternes Cask','Mizunara Cask','Virgin Oak','STR Cask','Tequila Cask','Quarter Cask','Hogshead','Butt','Puncheon','Multiple Cask']
};
const state={bottles:[],masterLists:structuredClone(DEFAULT_LISTS),filter:'All',search:'',currentPhoto:''};
const $=id=>document.getElementById(id);
const fields=['name','brand','distillery','independentBottler','category','country','region','caskType','age','abv','rating','quantity','status','fillLevel','dateAcquired','dateOpened','dateFinished','purchasePrice','notes'];
const bools=['nonChillFiltered','naturalColour','favourite','repurchase','replacementNeeded'];
function clean(s){return String(s??'').trim()}
function uniqSort(arr){const map=new Map();(arr||[]).forEach(v=>{const t=clean(v);if(t&&!map.has(t.toLowerCase()))map.set(t.toLowerCase(),t)});return [...map.values()].sort((a,b)=>a.localeCompare(b));}
function toast(msg,type='ok'){const t=$('toast');t.textContent=msg;t.className='toast show '+(type==='error'?'error':type==='warn'?'warn':'');setTimeout(()=>t.className='toast',2200)}
function showDiag(err){const d=$('diag');d.textContent=err && (err.stack||err.message||String(err));d.classList.add('show')}
function hideDiag(){const d=$('diag');d.textContent='';d.classList.remove('show')}
const IDB_NAME='myBottleListAtCA.v1.clean.db';
const IDB_STORE='appState';
const LEGACY_KEY_MATCH=/bottle|whisky|vault/i;
function payload(){return{schemaVersion:SCHEMA_VERSION,app:'My Bottle List at CA',savedAt:new Date().toISOString(),storageMode:state.storageMode||'localStorage',masterLists:state.masterLists,bottles:state.bottles};}
function applyPayload(data){state.bottles=Array.isArray(data?.bottles)?data.bottles:[];state.masterLists=mergeLists(DEFAULT_LISTS,data?.masterLists||{});state.storageMode=data?.storageMode||'localStorage';}
function openDb(){return new Promise((resolve,reject)=>{const req=indexedDB.open(IDB_NAME,1);req.onupgradeneeded=()=>req.result.createObjectStore(IDB_STORE);req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error||new Error('IndexedDB open failed'));});}
async function idbGet(){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(IDB_STORE,'readonly');const req=tx.objectStore(IDB_STORE).get(APP_KEY);req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>reject(req.error||new Error('IndexedDB read failed'));tx.oncomplete=()=>db.close();});}
async function idbSet(data){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(IDB_STORE,'readwrite');tx.objectStore(IDB_STORE).put(data,APP_KEY);tx.oncomplete=()=>{db.close();resolve();};tx.onerror=()=>{db.close();reject(tx.error||new Error('IndexedDB write failed'));};});}
async function idbClear(){return new Promise(resolve=>{const req=indexedDB.deleteDatabase(IDB_NAME);req.onsuccess=req.onerror=req.onblocked=()=>resolve();});}
function clearLegacyAppStorage(){try{const remove=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&LEGACY_KEY_MATCH.test(k))remove.push(k);}remove.forEach(k=>localStorage.removeItem(k));return remove.length;}catch(e){console.warn('Legacy storage cleanup failed',e);return 0;}}
const Storage={
  async load(){try{const raw=localStorage.getItem(APP_KEY);if(raw){applyPayload(JSON.parse(raw));return;}const idbData=await idbGet();if(idbData){applyPayload(idbData);state.storageMode='IndexedDB fallback';return;}}catch(e){console.error('Load failed',e);toast('Load failed. Starting with empty list.','warn')}},
  async save(){const data=payload();try{localStorage.setItem(APP_KEY,JSON.stringify({...data,storageMode:'localStorage'}));state.storageMode='localStorage';return;}catch(firstError){console.warn('localStorage save failed; trying app-cache cleanup and IndexedDB fallback',firstError);try{clearLegacyAppStorage();localStorage.removeItem(APP_KEY);localStorage.setItem(APP_KEY,JSON.stringify({...data,storageMode:'localStorage'}));state.storageMode='localStorage';toast('Saved after clearing old app cache.','warn');return;}catch(secondError){console.warn('localStorage retry failed; using IndexedDB fallback',secondError);await idbSet({...data,storageMode:'IndexedDB fallback'});state.storageMode='IndexedDB fallback';toast('Saved using larger browser storage.','warn');return;}}},
  async reset(){clearLegacyAppStorage();try{localStorage.removeItem(APP_KEY);}catch(e){}await idbClear();state.bottles=[];state.masterLists=structuredClone(DEFAULT_LISTS);state.currentPhoto='';state.storageMode='localStorage';}
};
function mergeLists(base,custom){const out={};Object.keys(base).forEach(k=>out[k]=uniqSort([...(base[k]||[]),...((custom&&custom[k])||[])]));return out;}
function refreshDatalists(){const pairs={brandList:'brands',distilleryList:'distilleries',independentBottlerList:'independentBottlers',categoryList:'categories',countryList:'countries',regionList:'regions',caskTypeList:'caskTypes'};Object.entries(pairs).forEach(([id,key])=>{$(id).innerHTML=state.masterLists[key].map(v=>`<option value="${escapeHtml(v)}"></option>`).join('')})}
function learnFromBottle(b){const map={brand:'brands',distillery:'distilleries',independentBottler:'independentBottlers',category:'categories',country:'countries',region:'regions',caskType:'caskTypes'};Object.entries(map).forEach(([field,key])=>{const v=clean(b[field]);if(v)state.masterLists[key]=uniqSort([...state.masterLists[key],v])})}
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function showScreen(name){['listScreen','formScreen','detailScreen'].forEach(id=>$(id).classList.toggle('active',id===name))}
function renderFilters(){const items=['All','Sealed','Opened','Finished','Favourite','Replacement','Scotch','Bourbon','Japanese','Irish'];$('filters').innerHTML=items.map(f=>`<button class="chip ${state.filter===f?'active':''}" data-filter="${f}">${f}</button>`).join('')}
function visibleBottles(){const q=state.search.toLowerCase();return state.bottles.filter(b=>{let ok=true;switch(state.filter){case'Sealed':ok=b.status==='Sealed';break;case'Opened':ok=b.status==='Opened';break;case'Finished':ok=b.status==='Finished';break;case'Favourite':ok=!!b.favourite;break;case'Replacement':ok=!!b.replacementNeeded;break;case'Scotch':ok=(b.category||'').toLowerCase().includes('scotch');break;case'Bourbon':ok=(b.category||'').toLowerCase().includes('bourbon');break;case'Japanese':ok=(b.category||'').toLowerCase().includes('japanese');break;case'Irish':ok=(b.category||'').toLowerCase().includes('irish');break;}if(!ok)return false;if(!q)return true;return JSON.stringify(b).toLowerCase().includes(q)}).sort((a,b)=>clean(a.name).localeCompare(clean(b.name)))}
function renderList(){renderFilters();const data=visibleBottles();if(!data.length){$('list').innerHTML='<div class="empty">No bottles found. Add a bottle or adjust filters.</div>';return;}$('list').innerHTML=data.map(b=>`<article class="card bottle-card" data-id="${b.id}" tabindex="0"><div class="photo">${b.photo?`<img src="${b.photo}" alt="">`:'🥃'}</div><div><div class="bottle-title">${escapeHtml(b.name||'Untitled Bottle')}</div><div class="meta">${escapeHtml([b.brand,b.distillery].filter(Boolean).join(' · '))}</div><div class="meta">${escapeHtml([b.category,b.region,b.country].filter(Boolean).join(' · '))}</div><div class="badges"><span class="badge gold">${escapeHtml(b.status||'Sealed')}</span>${b.age?`<span class="badge">${escapeHtml(b.age)} Years Old</span>`:''}${b.abv?`<span class="badge">${escapeHtml(b.abv)}%</span>`:''}${b.nonChillFiltered?'<span class="badge ok">NCF</span>':''}${b.naturalColour?'<span class="badge ok">Natural Colour</span>':''}${b.favourite?'<span class="badge gold">★ Favourite</span>':''}</div></div></article>`).join('')}
function blankForm(){hideDiag();$('formTitle').textContent='Add Bottle';$('bottleId').value='';fields.forEach(id=>{if($(id))$(id).value=id==='quantity'?'1':''});bools.forEach(id=>$(id).checked=false);$('status').value='Sealed';$('fillLevel').value='100%';state.currentPhoto='';$('photoInput').value='';if($('deleteEditBtn'))$('deleteEditBtn').style.display='none';renderPhotoPreview();}
function renderPhotoPreview(){const p=$('photoPreview');p.innerHTML=state.currentPhoto?`<img src="${state.currentPhoto}" alt="">`:'No photo'}
function openForm(id=null){blankForm();if(id){const b=state.bottles.find(x=>x.id===id);if(!b)return;hideDiag();$('formTitle').textContent='Edit Bottle';$('bottleId').value=b.id;fields.forEach(k=>{if($(k))$(k).value=b[k]??(k==='quantity'?'1':'')});bools.forEach(k=>$(k).checked=!!b[k]);state.currentPhoto=b.photo||'';if($('deleteEditBtn'))$('deleteEditBtn').style.display='inline-flex';renderPhotoPreview()}showScreen('formScreen')}
function formToBottle(){const b={id:$('bottleId').value||crypto.randomUUID(),photo:state.currentPhoto||''};fields.forEach(k=>b[k]=clean($(k)?.value));bools.forEach(k=>b[k]=!!$(k)?.checked);if(!b.name)throw new Error('Bottle Name is required.');return b;}
async function saveBottle(){hideDiag();try{const b=formToBottle();learnFromBottle(b);refreshDatalists();const idx=state.bottles.findIndex(x=>x.id===b.id);const isEdit=idx>=0;if(isEdit){state.bottles[idx]=b;}else{state.bottles.push(b);}await Storage.save();renderList();showScreen('listScreen');toast(isEdit?'Bottle changes saved.':'New bottle added.')}catch(e){console.error('Save failed',e);showDiag(e);toast('Save failed: '+(e.message||e.name||'check diagnostics.'),'error')}}
async function deleteBottle(id){const b=state.bottles.find(x=>x.id===id);if(!b)return;if(!confirm(`Delete "${b.name||'this bottle'}" and its embedded photo? This cannot be undone except from JSON backup.`))return;try{state.bottles=state.bottles.filter(x=>x.id!==id);await Storage.save();renderList();showScreen('listScreen');toast('Bottle deleted.')}catch(e){console.error('Delete failed',e);toast('Delete failed: '+(e.message||'check console.'),'error')}}
function detail(id){const b=state.bottles.find(x=>x.id===id);if(!b)return;const val=(label,v)=>`<div class="kv"><b>${label}</b>${escapeHtml(v||'—')}</div>`;$('detailScreen').innerHTML=`<div class="card detail"><div class="detail-head"><div class="photo">${b.photo?`<img src="${b.photo}" alt="">`:'🥃'}</div><div><h2>${escapeHtml(b.name||'Untitled Bottle')}</h2><div class="meta">${escapeHtml([b.brand,b.distillery].filter(Boolean).join(' · '))}</div><div class="badges"><span class="badge gold">${escapeHtml(b.status||'Sealed')}</span>${b.favourite?'<span class="badge gold">★ Favourite</span>':''}${b.repurchase?'<span class="badge ok">Repurchase</span>':''}${b.replacementNeeded?'<span class="badge">Replacement Needed</span>':''}</div></div></div><div class="detail-grid">${val('Brand',b.brand)}${val('Distillery',b.distillery)}${val('Independent Bottler',b.independentBottler)}${val('Category',b.category)}${val('Country',b.country)}${val('Region',b.region)}${val('Cask Type',b.caskType)}${val('Age Statement',b.age?b.age+' Years Old':'')}${val('ABV',b.abv?b.abv+'%':'')}${val('NCF',b.nonChillFiltered?'Yes':'No')}${val('Natural Colour',b.naturalColour?'Yes':'No')}${val('Fill Level',b.fillLevel)}${val('Quantity',b.quantity)}${val('Date Acquired',b.dateAcquired)}${val('Date Opened',b.dateOpened)}${val('Date Finished',b.dateFinished)}${val('Purchase Price',b.purchasePrice)}${val('Rating',b.rating)}<div class="kv wide"><b>Tasting Notes</b>${escapeHtml(b.notes||'—')}</div></div><div class="actions"><button class="btn primary" data-action="edit" data-id="${b.id}">Edit</button><button class="btn danger" data-action="delete" data-id="${b.id}">Delete</button><button class="btn" data-action="back">Back</button></div></div>`;showScreen('detailScreen')}
function readPhoto(file){return new Promise((resolve,reject)=>{if(!file)return resolve('');if(file.size>150000&&!confirm(`Image is ${(file.size/1024).toFixed(1)} KB. Recommended under 100 KB. Continue?`))return resolve(state.currentPhoto||'');const r=new FileReader();r.onload=()=>resolve(String(r.result||''));r.onerror=()=>reject(r.error||new Error('Photo read failed'));r.readAsDataURL(file)})}
function exportJson(){const payload={schemaVersion:SCHEMA_VERSION,app:'My Bottle List at CA',exportedAt:new Date().toISOString(),masterLists:state.masterLists,bottles:state.bottles};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`my-bottle-list-at-ca-${new Date().toISOString().slice(0,10)}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);toast('JSON exported.');}
async function importJson(file){try{const text=await file.text();const data=JSON.parse(text);if(!Array.isArray(data.bottles))throw new Error('Invalid JSON: bottles array missing.');state.bottles=data.bottles.map(x=>({...x,id:x.id||crypto.randomUUID()}));state.masterLists=mergeLists(DEFAULT_LISTS,data.masterLists||{});state.bottles.forEach(learnFromBottle);await Storage.save();refreshDatalists();renderList();showScreen('listScreen');toast('JSON imported.')}catch(e){console.error('Import failed',e);toast('Import failed: '+(e.message||'check JSON.'),'error')}}
async function resetStorage(){if(!confirm('Reset this app storage? This deletes saved bottles and embedded photos from this browser. Export JSON first if needed.'))return;await Storage.reset();refreshDatalists();renderList();showScreen('listScreen');toast('Storage reset.');}
function bind(){document.body.addEventListener('click',e=>{const el=e.target.closest('[data-action],[data-filter],.bottle-card');if(!el)return;if(el.dataset.filter){state.filter=el.dataset.filter;renderList();return;}if(el.classList.contains('bottle-card')){detail(el.dataset.id);return;}const a=el.dataset.action;if(a==='new')openForm();if(a==='save')saveBottle();if(a==='cancel'||a==='back'){renderList();showScreen('listScreen')}if(a==='edit')openForm(el.dataset.id);if(a==='delete')deleteBottle(el.dataset.id);if(a==='delete-current'){const id=$('bottleId').value;if(id)deleteBottle(id);}if(a==='export')exportJson();if(a==='reset')resetStorage();});$('searchInput').addEventListener('input',e=>{state.search=e.target.value;renderList()});$('photoInput').addEventListener('change',async e=>{try{const f=e.target.files&&e.target.files[0];if(f){state.currentPhoto=await readPhoto(f);renderPhotoPreview();toast('Photo loaded.')}}catch(err){console.error(err);toast('Photo load failed.','error')}});$('importFile').addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(f)importJson(f);e.target.value='';});}
function validateDom(){['listScreen','formScreen','detailScreen','list','filters','searchInput','toast',...fields,...bools].forEach(id=>{if(!$(id))throw new Error('Missing DOM node: '+id)})}
async function init(){try{validateDom();await Storage.load();refreshDatalists();bind();renderList();}catch(e){console.error('App init failed',e);document.body.innerHTML='<pre style="color:#ffd7d2;background:#211;padding:20px;white-space:pre-wrap">App init failed:\n'+escapeHtml(e.stack||e.message||String(e))+'</pre>'}}
init();
</script>
</body>
</html>
